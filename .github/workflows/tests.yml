name: tests

on:
  push:
  pull_request:

jobs:
  # Fast lint — independent of the heavy ML install. Surfaces ruff
  # findings in ~30s instead of waiting for torch/pyannote (~5 min cold).
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install ruff>=0.5
      - run: ruff check .

  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt \
            --extra-index-url https://download.pytorch.org/whl/cu126

      - name: Run pytest
        run: pytest
